name: KAGI
schemes:
  Kacha:
    build:
      targets:
        Kacha: all
        KachaTests: [test]
        KachaUITests: [test]
    test:
      targets:
        - KachaTests
        - KachaUITests
  KachaClip:
    build:
      targets:
        KachaClip: all
  KachaWatch:
    build:
      targets:
        KachaWatch: all
options:
  bundleIdPrefix: com.enablerdao
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.2"

settings:
  base:
    DEVELOPMENT_TEAM: 5BV85JW8US
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    CURRENT_PROJECT_VERSION: 10
    MARKETING_VERSION: "1.0.0"

targets:
  Kacha:
    type: application
    platform: iOS
    sources:
      - path: Kacha/Sources
      - path: Kacha/Resources
    info:
      path: Kacha/Info.plist
      properties:
        CFBundleDisplayName: KAGI
        CFBundleDevelopmentRegion: ja
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - kacha
        NSMicrophoneUsageDescription: 音声コマンドでスマートホームデバイスを操作するためにマイクを使用します
        NSSpeechRecognitionUsageDescription: 音声コマンドを認識してスマートホームデバイスを操作するために音声認識を使用します
        NSLocalNetworkUsageDescription: Philips HueブリッジとSwitchBotデバイスを検索するためにローカルネットワークにアクセスします
        NSBluetoothAlwaysUsageDescription: KAGIデバイスとBLEで接続して安否状態をリアルタイムに確認するためにBluetoothを使用します
        NSBluetoothPeripheralUsageDescription: KAGIデバイスとBLEで接続して安否状態をリアルタイムに確認するためにBluetoothを使用します
        NSLocationWhenInUseUsageDescription: 自宅に近づいた時にオートロック解除の通知を表示するために位置情報を使用します
        NSLocationAlwaysAndWhenInUseUsageDescription: 自宅に近づいた時にオートロック解除の通知を表示するために、バックグラウンドでも位置情報を使用します
        BGTaskSchedulerPermittedIdentifiers:
          - com.enablerdao.kacha.refresh
        NSBonjourServices:
          - _hue._tcp
        UIBackgroundModes:
          - location
          - fetch
          - processing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enablerdao.kacha
        PRODUCT_NAME: Kacha
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
    # dependencies:
    #   - target: KachaClip  # App Clip provisioning profile未設定のため一時無効化
    entitlements:
      path: Kacha/Kacha.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:kagi.pasha.run

  KachaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KachaTests/
    dependencies:
      - target: Kacha
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enablerdao.kacha.tests
        DEVELOPMENT_TEAM: 5BV85JW8US
        GENERATE_INFOPLIST_FILE: YES

  KachaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KachaUITests/
    dependencies:
      - target: Kacha
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enablerdao.kacha.uitests
        DEVELOPMENT_TEAM: 5BV85JW8US
        GENERATE_INFOPLIST_FILE: YES

  KachaClip:
    type: application.on-demand-install-capable
    platform: iOS
    sources:
      - path: KachaClip/
    info:
      path: KachaClip/Info.plist
      properties:
        CFBundleDisplayName: KAGI
        CFBundleDevelopmentRegion: ja
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSAppClip:
          NSAppClipRequestEphemeralUserNotification: false
          NSAppClipRequestLocationConfirmation: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enablerdao.kacha.Clip
        PRODUCT_NAME: KachaClip
        TARGETED_DEVICE_FAMILY: 1
        DEVELOPMENT_TEAM: 5BV85JW8US
        CODE_SIGN_STYLE: Automatic
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
        _EXPERIENCEKIT_IDENTIFIER: com.enablerdao.kacha.Clip
    entitlements:
      path: KachaClip/KachaClip.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:kagi.pasha.run
        com.apple.developer.parent-application-identifiers:
          - $(AppIdentifierPrefix)com.enablerdao.kacha

  KachaWatch:
    type: application
    platform: watchOS
    deploymentTarget:
      watchOS: "10.0"
    sources:
      - path: KachaWatch/Sources
      - path: KachaWatch/Assets.xcassets
    info:
      path: KachaWatch/Info.plist
      properties:
        CFBundleDisplayName: KAGI
        CFBundleDevelopmentRegion: ja
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        WKCompanionAppBundleIdentifier: com.enablerdao.kacha
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enablerdao.kacha.watchkitapp
        PRODUCT_NAME: KachaWatch
        TARGETED_DEVICE_FAMILY: 4
        DEVELOPMENT_TEAM: 5BV85JW8US
        CODE_SIGN_STYLE: Automatic
        SWIFT_VERSION: "5.9"
        SDKROOT: watchos
    dependencies: []

  KachaWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: KachaWidget/
    info:
      path: KachaWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enablerdao.kacha.widget
        TARGETED_DEVICE_FAMILY: 1
        DEVELOPMENT_TEAM: 5BV85JW8US
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: KachaWidget/KachaWidget.entitlements
    dependencies:
      - target: Kacha
