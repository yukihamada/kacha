name: Kacha
options:
  bundleIdPrefix: com.enablerdao
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.2"

settings:
  base:
    DEVELOPMENT_TEAM: 5BV85JW8US
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    CURRENT_PROJECT_VERSION: 3
    MARKETING_VERSION: "1.0.0"

targets:
  Kacha:
    type: application
    platform: iOS
    sources:
      - path: Kacha/Sources
      - path: Kacha/Resources
    info:
      path: Kacha/Info.plist
      properties:
        CFBundleDisplayName: KAGI
        CFBundleDevelopmentRegion: ja
        LSRequiresIPhoneOS: true
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        CFBundleIconName: AppIcon
        CFBundleURLTypes:
          - CFBundleURLSchemes:
              - kacha
        NSLocalNetworkUsageDescription: Philips HueブリッジとSwitchBotデバイスを検索するためにローカルネットワークにアクセスします
        NSLocationWhenInUseUsageDescription: 自宅に近づいた時にオートロック解除の通知を表示するために位置情報を使用します
        NSLocationAlwaysAndWhenInUseUsageDescription: 自宅に近づいた時にオートロック解除の通知を表示するために、バックグラウンドでも位置情報を使用します
        BGTaskSchedulerPermittedIdentifiers:
          - com.enablerdao.kacha.refresh
        NSBonjourServices:
          - _hue._tcp
        UIBackgroundModes:
          - location
          - fetch
          - processing
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enablerdao.kacha
        PRODUCT_NAME: Kacha
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: 1
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
    entitlements:
      path: Kacha/Kacha.entitlements
      properties:
        com.apple.developer.associated-domains:
          - applinks:kacha.pasha.run

  KachaTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: KachaTests/
    dependencies:
      - target: Kacha
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enablerdao.kacha.tests
        DEVELOPMENT_TEAM: 5BV85JW8US
        GENERATE_INFOPLIST_FILE: YES

  KachaUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: KachaUITests/
    dependencies:
      - target: Kacha
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enablerdao.kacha.uitests
        DEVELOPMENT_TEAM: 5BV85JW8US
        GENERATE_INFOPLIST_FILE: YES

  KachaWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: KachaWidget/
    info:
      path: KachaWidget/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.enablerdao.kacha.widget
        TARGETED_DEVICE_FAMILY: 1
        DEVELOPMENT_TEAM: 5BV85JW8US
        CODE_SIGN_STYLE: Automatic
    entitlements:
      path: KachaWidget/KachaWidget.entitlements
    dependencies:
      - target: Kacha
