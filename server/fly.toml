app = 'kagi-server'
primary_region = 'nrt'

[build]
dockerfile = "Dockerfile"

[env]
DATABASE_PATH = '/data/kagi.db'
PORT = '8080'

[http_service]
internal_port = 8080
force_https = true
auto_stop_machines = 'stop'
auto_start_machines = true
min_machines_running = 0

[mounts]
source = 'kacha_data'
destination = '/data'
